sources:
  rss:
    - https://simonwillison.net/atom/everything/   # best AI signal/noise ratio
    - https://huggingface.co/blog/feed.xml          # open-source models & tools
    - https://www.anthropic.com/news.rss            # Claude / safety research
    - https://blog.langchain.dev/rss/               # agents & RAG engineering
    - https://hnrss.org/frontpage                   # community trending topics

filtering:
  mode: semantic              # semantic | keyword | both
  similarity_threshold: 0.72
  max_articles: 20
  exclude_keywords: []        # hard exclusions (pre-embedding)

embedding:
  provider: gemini            # gemini | huggingface
  model: gemini-embedding-001
  api_key_env: GEMINI_API_KEY
  cache_path: ./.cache/embeddings.json

llm:
  provider: groq              # groq | gemini
  model: llama-3.3-70b-versatile
  api_key_env: GROQ_API_KEY

output:
  site_dir: ./output
  items_per_issue: 10
