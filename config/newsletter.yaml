# Each profile is one newsletter edition with its own RSS sources and its own
# profile.md (interests, level, language, theme, recency window). The embedding,
# llm, filtering, and output blocks below are shared across every profile.
profiles:
  - name: technical
    profile: profiles/technical.md
    sources:
      rss:
        - https://simonwillison.net/atom/everything/   # best AI signal/noise ratio
        - https://huggingface.co/blog/feed.xml          # open-source models & tools
        - https://raw.githubusercontent.com/taobojlen/anthropic-rss-feed/main/anthropic_news_rss.xml  # Anthropic news (community feed, updated every 6h)
        - https://blog.langchain.dev/rss.xml            # agents & RAG engineering
        - https://hnrss.org/frontpage                   # community trending topics

  - name: business
    profile: profiles/business.md
    sources:
      rss:
        - https://venturebeat.com/category/ai/feed/                      # enterprise AI adoption & market
        - https://venturebeat.com/category/enterprise/feed/              # enterprise buying & deployment signals
        - https://techcrunch.com/category/artificial-intelligence/feed/  # AI launches & startups
        - https://techcrunch.com/category/venture/feed/                  # funding rounds — where capital flows
        - https://www.technologyreview.com/topic/artificial-intelligence/feed  # AI analysis & industry impact
        - https://www.cbinsights.com/research/feed/                      # market intelligence & emerging categories
        - https://aibusiness.com/rss.xml                                 # enterprise AI business & use cases
        - https://sifted.eu/feed                                         # European startups & emerging markets
        - https://www.saastr.com/feed/                                   # SaaS monetization, pricing & GTM
        - https://www.ben-evans.com/benedictevans?format=rss             # strategic market analysis & platform shifts

filtering:
  mode: semantic              # semantic | keyword | both
  similarity_threshold: 0.72
  max_articles: 20
  exclude_keywords: []        # hard exclusions (pre-embedding)

embedding:
  provider: gemini            # gemini | huggingface | ollama
  model: gemini-embedding-001 # ollama e.g. nomic-embed-text
  api_key_env: GEMINI_API_KEY # ollama -> OLLAMA_API_KEY
  cache_path: ./.cache/embeddings.json
  # NOTE: switching the embedding model changes the vector dimension —
  # delete .cache/embeddings.json so the profile vector is recomputed.

# embedding:
#   provider: ollama
#   model: qwen3-embedding:8b
#   api_key_env: OLLAMA_API_KEY
#   cache_path: ./.cache/embeddings.json
  # NOTE: switching the embedding model changes the vector dimension —
  # delete .cache/embeddings.json so the profile vector is recomputed.

# llm:
#   provider: groq              # groq | gemini | ollama
#   model: llama-3.3-70b-versatile  # ollama e.g. gpt-oss:120b
#   api_key_env: GROQ_API_KEY   # ollama -> OLLAMA_API_KEY

llm:
  provider: ollama
  model: glm-5.2:cloud        # ou qwen3-coder:480b, deepseek-v3.1:671b…
  api_key_env: OLLAMA_API_KEY

output:
  site_dir: ./output
  items_per_issue: 20
