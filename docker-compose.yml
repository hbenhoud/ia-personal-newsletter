# Local development database only (Postgres + pgvector). The Go binaries run on
# the host and connect via DATABASE_URL. Production Postgres is Neon/Supabase.
#
#   docker compose up -d db
#   export DATABASE_URL="postgres://postgres:pw@localhost:5433/news?sslmode=disable"
#   go run ./cmd/ingest      # populate from RSS (uses .env API keys)
#   go run ./cmd/server      # http://localhost:8080
#   docker compose down      # stop (add -v to wipe data)
services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_PASSWORD: pw
      POSTGRES_DB: news
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
