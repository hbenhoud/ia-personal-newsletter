name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Build, Vet, Lint, Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: |
          go test ./... -race -count=1 -timeout=60s -coverprofile=coverage.out -covermode=atomic
          go tool cover -func=coverage.out | tail -1

      - name: Lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
