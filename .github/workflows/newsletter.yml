name: Newsletter

on:
  schedule:
    - cron: '0 7 */3 * *'  # Every 3 days at 07:00 UTC
  workflow_dispatch:        # Manual trigger from GitHub UI

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # needed by peaceiris/actions-gh-pages to push

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      # Persist embedding cache across runs — avoids re-embedding unchanged articles
      - uses: actions/cache@v4
        with:
          path: .cache/
          key: embeddings-${{ hashFiles('config/newsletter.yaml') }}-${{ github.run_id }}
          restore-keys: |
            embeddings-${{ hashFiles('config/newsletter.yaml') }}-

      # Inject per-profile files from secrets (kept out of git for privacy).
      # Add one secret per profile referenced in config/newsletter.yaml.
      - name: Write profiles
        run: |
          mkdir -p config/profiles
          printf '%s' "$PROFILE_TECHNICAL_MD" > config/profiles/technical.md
          printf '%s' "$PROFILE_BUSINESS_MD"  > config/profiles/business.md
        env:
          PROFILE_TECHNICAL_MD: ${{ secrets.PROFILE_TECHNICAL_MD }}
          PROFILE_BUSINESS_MD: ${{ secrets.PROFILE_BUSINESS_MD }}

      - name: Build
        run: go build -o newsletter ./cmd/newsletter

      - name: Generate
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}       # LLM (alt)
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}   # embeddings
          OLLAMA_API_KEY: ${{ secrets.OLLAMA_API_KEY }}   # LLM (glm-5.2:cloud)
        run: ./newsletter generate

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./output
          publish_branch: gh-pages
          commit_message: "newsletter: week ${{ github.run_number }}"

      # Toggle: set SLACK_NOTIFY variable to 'true' in Settings → Secrets and variables → Actions → Variables
      - name: Notify Slack
        if: success() && vars.SLACK_NOTIFY == 'true'
        run: |
          DATE=$(date +%Y-%m-%d)
          PAGES_URL="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}"
          curl -s -X POST "$SLACK_WEBHOOK_URL" \
            -H 'Content-Type: application/json' \
            -d "{\"text\":\"🗞️ *AI Newsletters ${DATE}* are ready!\n🔗 <${PAGES_URL}/index.html|Read them>\"}"
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
